<!DOCTYPE html>
<html>
<head>
<title>BusinessInsight AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        background:#212121;
        color:white;
        font-family:'Segoe UI',sans-serif;
        height:100vh;
        overflow:auto;
    }

    .container{
        display:flex;
        height:100vh;
    }

    .sidebar{
        width:260px;
        background:#171717;
        border-right:1px solid #333;
        display:flex;
        flex-direction:column;
    }

    .logo{
        padding:20px;
        font-size:20px;
        font-weight:bold;
    }

    .new-chat{
        margin:10px;
        padding:12px;
        background:#2d6cdf;
        border:none;
        border-radius:10px;
        color:white;
        cursor:pointer;
    }

    .history{
        padding:10px;
    }

    .history-item{
        padding:12px;
        margin-bottom:8px;
        background:#252525;
        border-radius:10px;
        cursor:pointer;
    }

    .history-item:hover{
        background:#333;
    }

    .main{
        flex:1;
        display:flex;
        flex-direction:column;
    }

    .header{
        height:60px;
        display:flex;
        align-items:center;
        padding:0 20px;
        border-bottom:1px solid #333;
        font-size:18px;
        font-weight:600;
    }

    #chat{
        flex:1;
        overflow-y:auto;
        padding:20px;
        max-width:1000px;
        width:100%;
        margin:auto;
    }

    .message{
        display:flex;
        margin:20px 0;
    }

    .user{
        justify-content:flex-end;
    }

    .bot{
        justify-content:flex-start;
    }

    .bubble{
        max-width:80%;
        padding:15px;
        border-radius:16px;
    }

    .user .bubble{
        background:#2d6cdf;
    }

    .bot .bubble{
        background:#2f2f2f;
    }

    #bottom{
        padding:20px;
        border-top:1px solid #333;
    }

    .input-container{
        max-width:1000px;
        margin:auto;
        display:flex;
        gap:10px;
    }

    input{
        flex:1;
        background:#2f2f2f;
        border:none;
        color:white;
        padding:15px;
        border-radius:12px;
        font-size:15px;
    }

    input:focus{
        outline:none;
    }

    button{
        background:#2d6cdf;
        border:none;
        color:white;
        padding:0 20px;
        border-radius:12px;
        cursor:pointer;
    }

    pre{
        white-space:pre-wrap;
        margin:0;
        font-family:inherit;
    }
   @media (max-width: 768px){

    .container{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
        height:auto;
        border-right:none;
        border-bottom:1px solid #333;
    }

    .history{
        display:flex;
        overflow-x:auto;
        gap:10px;
        padding:10px;
    }

    .history-item{
        min-width:180px;
        margin-bottom:0;
    }

    .header{
        height:50px;
        font-size:16px;
    }

    #chat{
        padding:10px;
    }

    .bubble{
        max-width:95%;
    }

    .input-container{
        flex-direction:column;
    }

    button{
        width:100%;
        height:50px;
    }

    input{
        width:100%;
    }

}
</style>
</head>

<body>

<div class="container">

    <div class="sidebar">

        <div class="logo">
            📊 BusinessInsight AI
        </div>

        <button class="new-chat" onclick="newChat()">
            + New Chat
        </button>

        <div class="history">
            <div class="history-item">
                Revenue Analysis
            </div>

            <div class="history-item">
                Route Performance
            </div>

            <div class="history-item">
                Profit Analysis
            </div>
        </div>

    </div>

    <div class="main">

        <div class="header">
            BusinessInsight AI
        </div>

        <div id="chat">

            <div class="message bot">
                <div class="bubble">
                    <pre>
Welcome to BusinessInsight AI.

Ask me:
• Why is revenue decreasing?
• Which routes are underperforming?
• What are the major business risks?
• How can profitability be improved?
                    </pre>
                </div>
            </div>

        </div>

        <div id="bottom">

            <div class="input-container">

                <input
                    id="question"
                    placeholder="Message BusinessInsight AI..."
                >

                <button onclick="sendMessage()">
                    Send
                </button>

            </div>

        </div>

    </div>

</div>
<script>

function newChat(){

    document.getElementById("chat").innerHTML = `
    <div class="message bot">
        <div class="bubble">
            <pre>
Welcome to BusinessInsight AI.

Ask me:
• Why is revenue decreasing?
• Which routes are underperforming?
• What are the major business risks?
• How can profitability be improved?
            </pre>
        </div>
    </div>
    `;
}

async function sendMessage(){

    const input = document.getElementById("question");
    const question = input.value.trim();

    if(!question){
        return;
    }

    const chat = document.getElementById("chat");

    // User Message

    chat.innerHTML += `
    <div class="message user">
        <div class="bubble">
            ${question}
        </div>
    </div>
    `;

    input.value = "";

    // Loading Message

    const loadingId = "loading-" + Date.now();

    chat.innerHTML += `
    <div class="message bot" id="${loadingId}">
        <div class="bubble">
            ⏳ Analyzing business data...
        </div>
    </div>
    `;

    chat.scrollTop = chat.scrollHeight;

    try{

        const response = await fetch(
            "https://travel-agency-agent-0c9s.onrender.com/chat",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    question:question
                })
            }
        );

        if(!response.ok){
            throw new Error(
                `HTTP ${response.status}`
            );
        }

        const data = await response.json();

        const loadingElement =
            document.getElementById(loadingId);

        if(loadingElement){
            loadingElement.remove();
        }

        chat.innerHTML += `
        <div class="message bot">
            <div class="bubble">
                <pre>${data.answer}</pre>
            </div>
        </div>
        `;

    }
    catch(error){

        const loadingElement =
            document.getElementById(loadingId);

        if(loadingElement){
            loadingElement.remove();
        }

        chat.innerHTML += `
        <div class="message bot">
            <div class="bubble">
                ❌ Backend Error

                ${error.message}
            </div>
        </div>
        `;

        console.error(error);
    }

    chat.scrollTop = chat.scrollHeight;
}


// ENTER KEY SUPPORT

document
.getElementById("question")
.addEventListener(
    "keydown",
    function(event){

        if(event.key === "Enter"){

            event.preventDefault();

            sendMessage();
        }

    }
);

</script>
</body>
</html>
